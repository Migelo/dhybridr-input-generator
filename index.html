<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dHybridR Input Generator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <button id="btn-menu" class="menu-btn" aria-label="Menu">&#9776;</button>
      <h1>dHybridR Input File Generator</h1>
    </div>
    <div class="header-controls">
      <div class="search-container">
        <input type="text" id="param-search" placeholder="Search parameters..." autocomplete="off">
        <div id="search-dropdown" class="search-dropdown hidden"></div>
      </div>
      <label class="dim-select">
        <span>Dimensions:</span>
        <select id="dim-select">
          <option value="1">1D</option>
          <option value="2" selected>2D</option>
          <option value="3">3D</option>
        </select>
      </label>
      <div class="header-buttons">
        <button id="btn-load" title="Load input file">📂 Load</button>
        <button id="btn-preset" title="Load preset">📋 Preset</button>
        <button id="btn-save-preset" title="Save current input as a preset">💾 Save</button>
        <button id="btn-generate" class="primary">⬇ Generate</button>
      </div>
    </div>
  </header>

  <input type="file" id="file-input" accept="*" style="display:none">

  <div id="preset-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Load Preset</h3>
      <div id="preset-list"></div>
      <button class="modal-close">Cancel</button>
    </div>
  </div>

  <div id="save-preset-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Save Preset</h3>
      <form id="save-preset-form" class="modal-form">
        <div class="form-field">
          <label for="save-preset-name">Name</label>
          <input type="text" id="save-preset-name" autocomplete="off" required>
          <div class="form-note" id="save-preset-note"></div>
        </div>
        <div class="form-field">
          <label for="save-preset-desc">Description <span class="form-label-muted">(optional)</span></label>
          <input type="text" id="save-preset-desc" autocomplete="off">
        </div>
        <div class="modal-buttons">
          <button type="button" class="modal-close" id="save-preset-cancel">Cancel</button>
          <button type="submit" class="primary" id="save-preset-confirm">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="mobile-overlay" class="mobile-overlay"></div>
  <div class="layout">
    <nav id="sidebar">
      <ul id="nav-list"></ul>
    </nav>
    <main id="main">
      <div id="sections"></div>
    </main>
    <div class="resize-handle" id="resize-handle"></div>
    <aside id="preview">
      <div class="preview-header">
        <h3>Preview</h3>
        <button id="btn-copy" title="Copy to clipboard">📋 Copy</button>
      </div>
      <pre id="preview-text"></pre>
    </aside>
  </div>
</div>
<script src="schema.js"></script>
<script src="generator.js"></script>
<script src="parser.js"></script>
<script src="app.js"></script>
<script>
// Draggable resize handle for preview panel
(function() {
  const handle = document.getElementById('resize-handle');
  const layout = document.querySelector('.layout');
  let dragging = false;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const previewWidth = window.innerWidth - e.clientX;
    const sidebarWidth = 200;
    const minMainWidth = 400;
    const handleWidth = 5;
    const minWidth = 200;
    const maxWidth = window.innerWidth - sidebarWidth - minMainWidth - handleWidth;
    const clamped = Math.max(minWidth, Math.min(maxWidth, previewWidth));
    layout.style.setProperty('--preview-width', clamped + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();
</script>
</body>
</html>
